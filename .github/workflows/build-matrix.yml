name: Build Matrix

on:
  workflow_dispatch:
    inputs:
      channel:
        description: "Build channel"
        required: true
        default: "production"
        type: choice
        options:
          - "production"
          - "test"
      test_branch:
        description: "Branch containing platform-packages/test/index.json"
        required: false
        default: "platform-test"
        type: string
      test_version:
        description: "Optional test semver override. Use MSI-safe numeric prerelease, for example 1.0.1-1002"
        required: false
        default: ""
        type: string
      publish_test_release:
        description: "Upload signed test updater assets to the test prerelease"
        required: false
        default: false
        type: boolean
  pull_request:
    branches:
      - "main"
  push:
    branches:
      - "feature/build-matrix*"
      - "feature/build-matrix/**"

concurrency:
  group: build-matrix-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  preflight:
    name: Preflight
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      CHANNEL: ${{ github.event_name == 'workflow_dispatch' && inputs.channel || 'production' }}
      TEST_VERSION: ${{ github.event_name == 'workflow_dispatch' && inputs.test_version || '' }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Node.js setup
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Install frontend dependencies
        run: npm install

      - name: Prepare test channel version
        if: github.event_name == 'workflow_dispatch' && inputs.channel == 'test'
        env:
          COCKPIT_TEST_CHANNEL_VERSION: ${{ env.TEST_VERSION }}
        run: npm run prepare:test-channel-version

      - name: Sync versions
        run: npm run sync-version

      - name: Check locales
        run: node scripts/check_locales.cjs

      - name: Typecheck
        run: npm run typecheck

  build:
    name: Build (${{ matrix.label }})
    needs: preflight
    runs-on: ${{ matrix.platform }}
    permissions:
      contents: read
    env:
      CHANNEL: ${{ github.event_name == 'workflow_dispatch' && inputs.channel || 'production' }}
      TEST_VERSION: ${{ github.event_name == 'workflow_dispatch' && inputs.test_version || '' }}
      COCKPIT_TOOLS_PROFILE: ${{ github.event_name == 'workflow_dispatch' && inputs.channel == 'test' && 'test' || '' }}
      VITE_COCKPIT_TOOLS_PROFILE: ${{ github.event_name == 'workflow_dispatch' && inputs.channel == 'test' && 'test' || '' }}
      COCKPIT_PLATFORM_PACKAGE_INDEX_URL: ${{ github.event_name == 'workflow_dispatch' && inputs.channel == 'test' && format('https://raw.githubusercontent.com/{0}/{1}/platform-packages/test/index.json', github.repository, inputs.test_branch) || '' }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: "macos-aarch64"
            platform: "macos-latest"
            args: "--target aarch64-apple-darwin"
            release_dir: "target/aarch64-apple-darwin/release"
          - label: "macos-x86_64"
            platform: "macos-latest"
            args: "--target x86_64-apple-darwin"
            release_dir: "target/x86_64-apple-darwin/release"
          - label: "macos-universal"
            platform: "macos-latest"
            args: "--target universal-apple-darwin"
            release_dir: "target/universal-apple-darwin/release"
          - label: "ubuntu-22.04"
            platform: "ubuntu-22.04"
            args: ""
            release_dir: "target/release"
          - label: "ubuntu-24.04-arm"
            platform: "ubuntu-24.04-arm"
            args: ""
            release_dir: "target/release"
          - label: "windows-latest"
            platform: "windows-latest"
            args: ""
            release_dir: "target/release"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies (Linux)
        if: startsWith(matrix.platform, 'ubuntu')
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev build-essential curl wget file libssl-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev patchelf pkg-config libsoup-3.0-dev javascriptcoregtk-4.1 libjavascriptcoregtk-4.1-dev
          sudo apt-get install -y libnm-dev xdg-utils

      - name: Rust setup
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Go setup
        uses: actions/setup-go@v5
        with:
          go-version-file: sidecars/cockpit-cliproxy/go.mod
          cache-dependency-path: sidecars/cockpit-cliproxy/go.sum

      - name: Node.js setup
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Install frontend dependencies
        run: npm install

      - name: Prepare test channel version
        if: github.event_name == 'workflow_dispatch' && inputs.channel == 'test'
        env:
          COCKPIT_TEST_CHANNEL_VERSION: ${{ env.TEST_VERSION }}
        run: npm run prepare:test-channel-version

      - name: Sync versions
        run: npm run sync-version

      - name: Cache Tauri binary dependencies
        uses: actions/cache@v4
        with:
          path: |
            ${{ matrix.platform == 'windows-latest' && 'C:\Users\runneradmin\AppData\Local\tauri' || '' }}
            ${{ startsWith(matrix.platform, 'ubuntu') && '~/.cache/tauri' || '' }}
            ${{ matrix.platform == 'macos-latest' && '~/Library/Caches/tauri' || '' }}
          key: tauri-deps-${{ matrix.platform }}-${{ hashFiles('**/Cargo.toml') }}
          restore-keys: |
            tauri-deps-${{ matrix.platform }}-

      - name: Build app (pull request)
        if: github.event_name == 'pull_request'
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          npx tauri build --ci --config src-tauri/tauri.ci.conf.json ${{ matrix.args }} 2>&1 | tee "build-${{ matrix.label }}.log"

      - name: Print build logs on failure (PR)
        if: failure() && github.event_name == 'pull_request'
        shell: bash
        run: |
          echo "=== BUILD LOG (PR) ==="
          if [ -f "build-${{ matrix.label }}.log" ]; then
            tail -n 200 "build-${{ matrix.label }}.log"
          else
            echo "Log file not found"
          fi

      - name: Build app (signed)
        if: github.event_name != 'pull_request' && !(github.event_name == 'workflow_dispatch' && inputs.channel == 'test')
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          set -euo pipefail
          npx tauri build --ci ${{ matrix.args }} 2>&1 | tee "build-${{ matrix.label }}.log"

      - name: Build app (test channel)
        if: github.event_name == 'workflow_dispatch' && inputs.channel == 'test'
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          set -euo pipefail
          npx tauri build --ci --config src-tauri/tauri.test.conf.json ${{ matrix.args }} 2>&1 | tee "build-${{ matrix.label }}.log"

      - name: Print build logs on failure (Signed)
        if: failure() && github.event_name != 'pull_request'
        shell: bash
        run: |
          echo "=== BUILD LOG (SIGNED) ==="
          if [ -f "build-${{ matrix.label }}.log" ]; then
            tail -n 200 "build-${{ matrix.label }}.log"
          else
            echo "Log file not found"
          fi

      - name: Summarize warnings
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          log_file="build-${{ matrix.label }}.log"
          warnings_file="warnings-${{ matrix.label }}.txt"
          if grep -n "^warning:" "$log_file" > "$warnings_file"; then
            warning_count="$(wc -l < "$warnings_file" | tr -d ' ')"
          else
            : > "$warnings_file"
            warning_count="0"
          fi

          {
            echo "## ${{ matrix.label }}"
            echo
            echo "- warnings: ${warning_count}"
            echo "- log: build-${{ matrix.label }}.log"
            if [ -s "$warnings_file" ]; then
              echo
              echo '```text'
              sed -n '1,200p' "$warnings_file"
              echo '```'
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload build logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: logs-${{ matrix.label }}
          retention-days: 7
          if-no-files-found: error
          path: |
            build-${{ matrix.label }}.log
            warnings-${{ matrix.label }}.txt

      - name: Upload bundles
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: bundles-${{ matrix.label }}
          retention-days: 7
          if-no-files-found: error
          path: |
            ${{ matrix.release_dir }}/bundle

  publish-test-release:
    name: Publish Test Release
    needs: build
    if: github.event_name == 'workflow_dispatch' && inputs.channel == 'test' && inputs.publish_test_release == true
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      TEST_VERSION: ${{ inputs.test_version }}
      TEST_RELEASE_TAG: "test-latest"
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download bundle artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: bundles-*
          path: test-release-assets

      - name: Build and upload test updater JSON
        shell: bash
        run: |
          set -euo pipefail
          version="${TEST_VERSION}"
          if [ -z "${version}" ]; then
            version="$(node -p "require('./package.json').version")"
          fi

          rm -rf test-release-flat
          mkdir -p test-release-flat
          node <<'NODE'
          const fs = require('node:fs');
          const path = require('node:path');

          const sourceRoot = path.resolve('test-release-assets');
          const targetRoot = path.resolve('test-release-flat');
          const allowed = [
            '.sig',
            '.AppImage',
            '.deb',
            '.rpm',
            '.msi',
            '.exe',
            '.dmg',
            '.app.tar.gz',
          ];
          const macArchByArtifact = new Map([
            ['bundles-macos-aarch64', 'aarch64'],
            ['bundles-macos-x86_64', 'x64'],
            ['bundles-macos-universal', 'universal'],
          ]);

          function walk(dir, files = []) {
            for (const entry of fs.readdirSync(dir, { withFileTypes: true })) {
              const fullPath = path.join(dir, entry.name);
              if (entry.isDirectory()) {
                walk(fullPath, files);
              } else if (entry.isFile()) {
                files.push(fullPath);
              }
            }
            return files;
          }

          function isAllowed(fileName) {
            return allowed.some((suffix) => fileName.endsWith(suffix));
          }

          function macRename(fileName, artifactName) {
            const arch = macArchByArtifact.get(artifactName);
            if (!arch) return fileName;
            if (/(?:_aarch64|_x64|_universal)\.app\.tar\.gz(?:\.sig)?$/u.test(fileName)) {
              return fileName;
            }
            if (fileName.endsWith('.app.tar.gz.sig')) {
              return fileName.replace(/\.app\.tar\.gz\.sig$/u, `_${arch}.app.tar.gz.sig`);
            }
            if (fileName.endsWith('.app.tar.gz')) {
              return fileName.replace(/\.app\.tar\.gz$/u, `_${arch}.app.tar.gz`);
            }
            return fileName;
          }

          for (const filePath of walk(sourceRoot)) {
            const relative = path.relative(sourceRoot, filePath);
            const [artifactName] = relative.split(path.sep);
            const baseName = path.basename(filePath);
            if (!isAllowed(baseName)) continue;
            const targetName = macRename(baseName, artifactName);
            fs.copyFileSync(filePath, path.join(targetRoot, targetName));
          }
          NODE
          find test-release-flat -maxdepth 1 -type f -print | sort

          cat > test-release-notes.md <<EOF
          Cockpit Tools test channel build ${version}.

          This prerelease is only used by test-channel builds.
          EOF

          node scripts/release/build_merged_latest_json.cjs \
            --version "${version}" \
            --release-tag "${TEST_RELEASE_TAG}" \
            --repo "${GITHUB_REPOSITORY}" \
            --assets-dir test-release-flat \
            --notes-file test-release-notes.md \
            --published-at "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            --output test-release-flat/latest-test.json

          if gh release view "${TEST_RELEASE_TAG}" --repo "${GITHUB_REPOSITORY}" >/dev/null 2>&1; then
            gh release edit "${TEST_RELEASE_TAG}" \
              --repo "${GITHUB_REPOSITORY}" \
              --title "Cockpit Tools Test Channel" \
              --notes-file test-release-notes.md \
              --prerelease \
              --latest=false
          else
            gh release create "${TEST_RELEASE_TAG}" \
              --repo "${GITHUB_REPOSITORY}" \
              --title "Cockpit Tools Test Channel" \
              --notes-file test-release-notes.md \
              --prerelease \
              --latest=false
          fi

          gh release upload "${TEST_RELEASE_TAG}" test-release-flat/* \
            --repo "${GITHUB_REPOSITORY}" \
            --clobber
